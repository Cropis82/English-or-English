<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Remove default browser margins and scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Black background just in case */
        }

        /* Stretch the image to cover the screen */
        img {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <img src="https://pbs.twimg.com/media/FtCvD14WIAAhvJE.jpg" alt="Secret Image">
</body>
</html>
