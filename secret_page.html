<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Image</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
    }
    img {
        width: 100vw;
        height: 100vh;
        display: block;
    }
</style>
</head>
<body>
    <img id="randomImage" src="" alt="Random Image">

    <script>
        function loadRandomImage() {
            const randomUrl = "https://picsum.photos/1920/1080?random=" + Math.random();
            document.getElementById("randomImage").src = randomUrl;
        }
        
        loadRandomImage();
    </script>
</body>
</html>
